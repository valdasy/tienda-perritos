name: CI/CD - Tienda Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build y Push imagen Frontend
        run: |
          docker build -t ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest ./frontend
          docker push ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest

      - name: Desplegar en EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_FRONTEND_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              'aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}',
              'docker pull ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest',
              'docker stop tienda-frontend || true',
              'docker rm tienda-frontend || true',
              'docker run -d --name tienda-frontend -p 80:80 --restart always ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest'
            ]" \
            --region ${{ secrets.AWS_REGION }}