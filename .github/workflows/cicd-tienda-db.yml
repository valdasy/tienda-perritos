name: CI/CD - Tienda DB

on:
  push:
    branches:
      - main
    paths:
      - 'db/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build y Push imagen DB
        run: |
          docker build -t ${{ secrets.ECR_REPO_URL_DB }}:latest ./db
          docker push ${{ secrets.ECR_REPO_URL_DB }}:latest

      - name: Desplegar en EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_DB_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              'aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}',
              'docker pull ${{ secrets.ECR_REPO_URL_DB }}:latest',
              'docker stop tienda-db || true',
              'docker rm tienda-db || true',
              'docker run -d --name tienda-db -p 3306:3306 -v dbdata:/var/lib/mysql ${{ secrets.ECR_REPO_URL_DB }}:latest'
            ]" \
            --region ${{ secrets.AWS_REGION }}