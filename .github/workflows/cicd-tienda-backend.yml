name: CI/CD - Tienda Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build y Push imagen Backend
        run: |
          docker build -t ${{ secrets.ECR_REPO_URL_BACKEND }}:latest ./backend
          docker push ${{ secrets.ECR_REPO_URL_BACKEND }}:latest

      - name: Desplegar en EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_BACKEND_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              'aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}',
              'docker pull ${{ secrets.ECR_REPO_URL_BACKEND }}:latest',
              'docker stop tienda-backend || true',
              'docker rm tienda-backend || true',
              'docker run -d --name tienda-backend -p 3001:3001 -e DB_HOST=${{ secrets.EC2_DB_INSTANCE_ID }} -e DB_USER=${{ secrets.DB_USER }} -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} -e DB_NAME=${{ secrets.DB_NAME }} --restart always ${{ secrets.ECR_REPO_URL_BACKEND }}:latest'
            ]" \
            --region ${{ secrets.AWS_REGION }}